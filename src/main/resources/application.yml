spring:
  application:
    name: token-billing

  datasource:
    url: jdbc:postgresql://localhost:54323/token_billing
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
